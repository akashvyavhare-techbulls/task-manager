name: deployemnt-workflow

on:
  push:
    branch:
      main:

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres-db:
        image: postgres:16

        env:
          POSTGRES_DB: taskmanager
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        
        ports:
          - 5433:5432
        
    steps:
      - name: checkout-Repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build and Test
        run: mvn verify
      
      - name: Build Image
        run: docker build -t akashvyavharetechbulls/task-manager-app:latest .

      - name: Login to registry
        run:  echo "${{secrets.DOCKER_TOKEN}}" | docker login -u akashvyavharetechbulls --password-stdin

      - name: push to registry
        run: docker push akashvyavharetechbulls/task-manager-app:latest