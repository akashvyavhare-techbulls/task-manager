name: deployemnt-workflow

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres-db:
        image: postgres:16

        env:
          POSTGRES_DB: taskmanager
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        
        ports:
          - 5433:5432
        
    steps:
      - name: checkout-Repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build and Test
        run: mvn verify
      
      - name: Build Image
        run: docker build -t akashvyavharetechbulls/task-manager-app:${{github.sha}}  -t akashvyavharetechbulls/task-manager-app:latest .

      - name: Login to registry
        run:  echo "${{secrets.DOCKER_TOKEN}}" | docker login -u akashvyavharetechbulls --password-stdin

      - name: push to registry
        run: |
          docker push akashvyavharetechbulls/task-manager-app:${{ github.sha }}
          docker push akashvyavharetechbulls/task-manager-app:latest

  
  
  deploy:

    needs: build

    runs-on: ubuntu-latest

    steps:
      - name: configure-ssh
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Trust EC2 host
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            cd ~/task-manager
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          EOF
